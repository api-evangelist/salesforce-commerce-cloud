"""
Salesforce Commerce Cloud GraphQL Schema
Conceptual schema derived from SCAPI (Salesforce Commerce API) and OCAPI REST APIs.
Covers B2C Commerce headless commerce: catalog, pricing, promotions, cart, checkout,
orders, customers, inventory, search, content, configuration, and Einstein.
"""

scalar DateTime
scalar JSON

# ---------------------------------------------------------------------------
# Locale and Currency
# ---------------------------------------------------------------------------

type Locale {
  id: ID!
  name: String!
  country: String
  language: String
  currency: Currency
  isDefault: Boolean
}

type Currency {
  code: ID!
  name: String!
  symbol: String
  decimalDigits: Int
}

# ---------------------------------------------------------------------------
# Catalog and Product
# ---------------------------------------------------------------------------

type Catalog {
  id: ID!
  name: String!
  description: String
  online: Boolean
  categories(depth: Int): [Category!]!
  products(limit: Int, offset: Int): ProductConnection!
  createdAt: DateTime
  updatedAt: DateTime
}

type Category {
  id: ID!
  name: String!
  description: String
  parentCategory: Category
  subCategories: [Category!]!
  products(limit: Int, offset: Int): ProductConnection!
  image: String
  thumbnail: String
  online: Boolean
  sortOrder: Int
  pageTitle: String
  pageDescription: String
  pageKeywords: String
  customAttributes: JSON
}

type Product {
  id: ID!
  name: String!
  description: String
  longDescription: String
  shortDescription: String
  type: ProductType!
  brand: String
  ean: String
  upc: String
  unit: String
  stepQuantity: Float
  minOrderQuantity: Float
  categories: [Category!]!
  primaryCategory: Category
  variants: [ProductVariant!]!
  variationAttributes: [VariationAttribute!]!
  images: [ProductImage!]!
  primaryImage: ProductImage
  price: Float
  priceMax: Float
  priceMin: Float
  prices: [Price!]!
  promotions: [Promotion!]!
  inventory: InventoryRecord
  online: Boolean
  searchable: Boolean
  pageTitle: String
  pageDescription: String
  pageKeywords: String
  customAttributes: JSON
  bundledProducts: [BundledProduct!]!
  setProducts: [Product!]!
  recommendations: [ProductRecommendation!]!
  createdAt: DateTime
  updatedAt: DateTime
}

enum ProductType {
  SIMPLE
  VARIANT
  MASTER
  SET
  BUNDLE
  ITEM
}

type ProductVariant {
  id: ID!
  name: String
  productId: String!
  ean: String
  upc: String
  price: Float
  prices: [Price!]!
  variationValues: JSON
  variationAttributes: [VariationAttributeValue!]!
  images: [ProductImage!]!
  inventory: InventoryRecord
  online: Boolean
  orderable: Boolean
  customAttributes: JSON
}

type VariationAttribute {
  id: ID!
  name: String!
  values: [VariationAttributeValue!]!
  slicing: Boolean
}

type VariationAttributeValue {
  value: String!
  name: String
  orderable: Boolean
  description: String
  image: ProductImage
  swatchImage: ProductImage
}

type ProductImage {
  title: String
  alt: String
  link: String!
  disBaseLink: String
  absURL: String
}

type BundledProduct {
  product: Product!
  quantity: Float!
}

type ProductRecommendation {
  product: Product!
  recommendationType: String
}

type ProductConnection {
  total: Int!
  limit: Int!
  offset: Int!
  items: [Product!]!
}

# ---------------------------------------------------------------------------
# Price and Price Book
# ---------------------------------------------------------------------------

type PriceBook {
  id: ID!
  name: String!
  description: String
  currency: Currency!
  online: Boolean
  parentPriceBook: PriceBook
  schedules: [Schedule!]!
  prices(limit: Int, offset: Int): [Price!]!
  createdAt: DateTime
  updatedAt: DateTime
}

type Price {
  value: Float!
  currency: String!
  priceBook: PriceBook
  quantity: Float
  type: PriceType
}

enum PriceType {
  LIST
  SALE
  MEMBER
  TIERED
}

# ---------------------------------------------------------------------------
# Promotions and Campaigns
# ---------------------------------------------------------------------------

type Campaign {
  id: ID!
  name: String!
  description: String
  enabled: Boolean
  startDate: DateTime
  endDate: DateTime
  schedule: Schedule
  promotions: [Promotion!]!
  customerGroups: [CustomerGroup!]!
  coupons: [Coupon!]!
  createdAt: DateTime
  updatedAt: DateTime
}

type Promotion {
  id: ID!
  name: String!
  description: String
  calloutMsg: String
  details: PromotionData
  enabled: Boolean
  exclusive: Boolean
  promotionClass: PromotionClass
  campaignId: String
  campaign: Campaign
  coupons: [Coupon!]!
  qualifyingProducts: [Product!]!
  schedule: Schedule
  createdAt: DateTime
  updatedAt: DateTime
}

enum PromotionClass {
  PRODUCT
  SHIPPING
  ORDER
}

type PromotionData {
  condition: String
  discountType: DiscountType
  discountValue: Float
  maxApplications: Int
  applyToSale: Boolean
  discountedProducts: [Product!]!
  bonusProducts: [Product!]!
}

enum DiscountType {
  PERCENTAGE
  AMOUNT
  FREE_SHIPPING
  BUY_X_GET_Y
  BONUS
  FIXED_PRICE
}

type Coupon {
  id: ID!
  description: String
  enabled: Boolean
  code: String
  codePrefix: String
  usedCount: Int
  singleCode: String
  redemptionLimit: Int
  redemptionLimitPerCustomer: Int
  caseInsensitive: Boolean
  createdAt: DateTime
  updatedAt: DateTime
}

type Schedule {
  startDate: DateTime
  endDate: DateTime
  recurrence: String
}

# ---------------------------------------------------------------------------
# Cart / Basket
# ---------------------------------------------------------------------------

type Cart {
  id: ID!
  customerId: String
  customer: Customer
  guestCheckout: Boolean
  items: [CartItem!]!
  productItems: [CartItem!]!
  giftCertificateItems: [GiftCardItem!]!
  couponItems: [CartCoupon!]!
  promotions: [Promotion!]!
  shippingItems: [ShippingItem!]!
  priceAdjustments: [PriceAdjustment!]!
  tax: CartTax
  taxTotal: Float
  productSubTotal: Float
  productTotal: Float
  shippingTotal: Float
  shippingTotalTax: Float
  adjustedShippingTotal: Float
  orderTotal: Float
  currency: String
  locale: String
  siteId: String
  notes: [Note!]!
  shipments: [Shipment!]!
  paymentInstruments: [PaymentInstrument!]!
  createdAt: DateTime
  updatedAt: DateTime
}

type CartItem {
  id: ID!
  productId: String!
  product: Product
  productName: String
  quantity: Float!
  itemText: String
  basePrice: Float
  price: Float
  priceAfterItemDiscount: Float
  priceAfterOrderDiscount: Float
  tax: Float
  taxBasis: Float
  shipmentId: String
  priceAdjustments: [PriceAdjustment!]!
  optionItems: [OptionItem!]!
  bundledItems: [CartItem!]!
  customAttributes: JSON
}

type CartTax {
  totalTax: Float
  taxTotal: Float
  items: [TaxItem!]!
}

type TaxItem {
  id: String!
  tax: Float!
  taxRate: Float!
}

type PriceAdjustment {
  id: ID!
  promotionId: String
  promotionLink: String
  couponCode: String
  itemText: String
  price: Float
  appliedDiscount: JSON
  manualAdjustment: Boolean
}

type CartCoupon {
  code: String!
  statusCode: String
  valid: Boolean
  couponItemId: String
}

type ShippingItem {
  id: ID!
  shipmentId: String
  itemText: String
  basePrice: Float
  price: Float
  tax: Float
  taxBasis: Float
  priceAdjustments: [PriceAdjustment!]!
}

type GiftCardItem {
  id: ID!
  amount: Float!
  message: String
  recipientEmail: String
  recipientName: String
  senderName: String
}

type GiftCard {
  id: ID!
  code: String!
  balance: Float!
  currency: String!
  enabled: Boolean
  maskedCode: String
  statusCode: String
  orderNo: String
  createdAt: DateTime
}

type GiftCardItem {
  id: ID!
  amount: Float!
  message: String
  recipientEmail: String
  recipientName: String
  senderName: String
}

type Note {
  id: ID!
  text: String!
  subject: String
  createdAt: DateTime
}

type OptionItem {
  id: ID!
  optionId: String!
  optionValueId: String!
  price: Float
}

# ---------------------------------------------------------------------------
# Shipment and Shipping
# ---------------------------------------------------------------------------

type Shipment {
  id: ID!
  shipmentNo: String
  shippingAddress: Address
  shippingMethod: ShippingMethod
  shippingItems: [ShippingItem!]!
  productItems: [CartItem!]!
  giftMessage: String
  giftBoxWrap: Boolean
  trackingNumber: String
  shippingStatus: String
}

type ShippingMethod {
  id: ID!
  name: String!
  description: String
  price: Float
  currency: String
  estimatedArrivalTime: String
  online: Boolean
  storePickupEnabled: Boolean
  customAttributes: JSON
}

type ShippingOption {
  shippingMethod: ShippingMethod!
  price: Float!
  applicableShippingPromotions: [Promotion!]!
}

# ---------------------------------------------------------------------------
# Checkout and Order
# ---------------------------------------------------------------------------

type Checkout {
  id: ID!
  cart: Cart
  customer: Customer
  billingAddress: Address
  paymentInstruments: [PaymentInstrument!]!
  shipments: [Shipment!]!
  orderTotal: Float
  currency: String
  status: CheckoutStatus
  createdAt: DateTime
  updatedAt: DateTime
}

enum CheckoutStatus {
  DRAFT
  PAYMENT_PENDING
  PAYMENT_AUTHORIZED
  CONFIRMED
  CANCELLED
}

type Order {
  id: ID!
  orderNo: String!
  customerId: String
  customer: Customer
  status: OrderStatus!
  productItems: [OrderItem!]!
  giftCertificateItems: [GiftCardItem!]!
  couponItems: [CartCoupon!]!
  priceAdjustments: [PriceAdjustment!]!
  shippingItems: [ShippingItem!]!
  shipments: [OrderShipment!]!
  billingAddress: Address
  paymentInstruments: [OrderPayment!]!
  orderTotal: Float
  productSubTotal: Float
  shippingTotal: Float
  taxTotal: Float
  adjustedMerchandizeTotalTax: Float
  adjustedShippingTotalTax: Float
  currency: String
  locale: String
  siteId: String
  channelType: ChannelType
  notes: [Note!]!
  confirmationStatus: String
  exportStatus: String
  externalOrderStatus: String
  createdAt: DateTime
  updatedAt: DateTime
}

enum OrderStatus {
  CREATED
  NEW
  OPEN
  COMPLETED
  CANCELLED
  REPLACED
  FAILED
}

enum ChannelType {
  STOREFRONT
  CALLCENTER
  MOBILE
  API
  MARKETPLACE
}

type OrderItem {
  id: ID!
  productId: String!
  product: Product
  productName: String
  quantity: Float!
  basePrice: Float
  price: Float
  priceAfterItemDiscount: Float
  priceAfterOrderDiscount: Float
  tax: Float
  taxBasis: Float
  shipmentId: String
  priceAdjustments: [PriceAdjustment!]!
  optionItems: [OptionItem!]!
  customAttributes: JSON
}

type OrderPayment {
  id: ID!
  paymentMethodId: String
  paymentMethod: PaymentMethod
  amount: Float
  amountAuthorized: Float
  amountPaid: Float
  amountRefunded: Float
  paymentInstrumentId: String
  creditCardToken: String
  creditCardType: String
  maskedGiftCertificateCode: String
  bankRoutingNumber: String
  paymentCard: PaymentCard
  customAttributes: JSON
}

type OrderShipment {
  id: ID!
  shipmentNo: String
  shippingAddress: Address
  shippingMethod: ShippingMethod
  productItems: [OrderItem!]!
  trackingNumber: String
  shippingStatus: OrderShipmentStatus
  giftMessage: String
}

enum OrderShipmentStatus {
  NOT_SHIPPED
  PARTIALLY_SHIPPED
  SHIPPED
}

# ---------------------------------------------------------------------------
# Payment
# ---------------------------------------------------------------------------

type PaymentMethod {
  id: ID!
  name: String!
  description: String
  image: String
  online: Boolean
  cards: [PaymentCardType!]!
  paymentProcessor: String
  customAttributes: JSON
}

type PaymentCard {
  number: String
  maskedNumber: String
  cardType: String
  holder: String
  expirationMonth: Int
  expirationYear: Int
}

type PaymentCardType {
  cardType: String!
  name: String!
  description: String
}

type PaymentInstrument {
  id: ID!
  paymentMethodId: String
  amount: Float
  paymentCard: PaymentCard
  maskedGiftCertificateCode: String
  bankRoutingNumber: String
}

# ---------------------------------------------------------------------------
# Tax
# ---------------------------------------------------------------------------

type TaxCalculation {
  orderId: String
  orderTotal: Float
  taxTotal: Float
  currency: String
  items: [TaxLineItem!]!
}

type TaxLineItem {
  id: String!
  taxAmount: Float!
  taxRate: Float!
  taxCode: String
  jurisdiction: String
}

# ---------------------------------------------------------------------------
# Customer
# ---------------------------------------------------------------------------

type Customer {
  id: ID!
  customerId: String!
  customerNo: String
  email: String!
  firstName: String
  lastName: String
  login: String
  gender: CustomerGender
  birthday: String
  phoneHome: String
  phoneBusiness: String
  phoneMobile: String
  fax: String
  enabled: Boolean
  addresses: [CustomerAddress!]!
  paymentInstruments: [PaymentInstrument!]!
  customerGroups: [CustomerGroup!]!
  orders(limit: Int, offset: Int): CustomerOrderConnection!
  baskets: [CustomerBasket!]!
  wishLists: [WishList!]!
  preferences: JSON
  customAttributes: JSON
  createdAt: DateTime
  updatedAt: DateTime
  lastLoginAt: DateTime
  lastModifiedAt: DateTime
}

enum CustomerGender {
  MALE
  FEMALE
  NOT_SPECIFIED
}

type CustomerAddress {
  id: ID!
  addressId: String!
  salutation: String
  title: String
  firstName: String
  secondName: String
  lastName: String
  suffix: String
  companyName: String
  address1: String!
  address2: String
  address3: String
  city: String!
  stateCode: String
  postalCode: String
  countryCode: String!
  phone: String
  preferred: Boolean
  postBox: String
  customAttributes: JSON
}

type Address {
  id: ID
  salutation: String
  title: String
  firstName: String
  secondName: String
  lastName: String
  suffix: String
  companyName: String
  address1: String!
  address2: String
  address3: String
  city: String!
  stateCode: String
  postalCode: String
  countryCode: String!
  phone: String
  postBox: String
}

type CustomerBasket {
  basketId: ID!
  customerId: String
  basketType: String
  currency: String
  createdAt: DateTime
  updatedAt: DateTime
}

type CustomerOrderConnection {
  total: Int!
  limit: Int!
  offset: Int!
  orders: [Order!]!
}

type CustomerGroup {
  id: ID!
  name: String!
  description: String
  rule: String
  memberCount: Int
  createdAt: DateTime
  updatedAt: DateTime
}

type CustomerList {
  id: ID!

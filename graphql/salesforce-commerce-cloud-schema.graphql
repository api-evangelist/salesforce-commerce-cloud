  description: String
  customerCount: Int
  customers(limit: Int, offset: Int): [Customer!]!
  createdAt: DateTime
  updatedAt: DateTime
}

type WishList {
  id: ID!
  name: String!
  description: String
  public: Boolean
  items: [WishListItem!]!
  createdAt: DateTime
  updatedAt: DateTime
}

type WishListItem {
  id: ID!
  product: Product
  productId: String!
  quantity: Float!
  priority: Int
  publicView: Boolean
  purchasedQuantity: Float
}

# ---------------------------------------------------------------------------
# Inventory
# ---------------------------------------------------------------------------

type InventoryList {
  id: ID!
  name: String!
  description: String
  default: Boolean
  onOrder: Boolean
  records(limit: Int, offset: Int): [InventoryRecord!]!
  createdAt: DateTime
  updatedAt: DateTime
}

type InventoryRecord {
  id: ID!
  productId: String!
  product: Product
  inventoryList: InventoryList
  quantity: Float!
  allocatedQuantity: Float
  backorderable: Boolean
  backorderQuantity: Float
  onOrder: Boolean
  preorderable: Boolean
  preorderQuantity: Float
  ats: Float
  perpetual: Boolean
  stockLevel: Float
  turnover: Float
  inStockDate: DateTime
  customAttributes: JSON
}

type Inventory {
  productId: String!
  orderable: Boolean!
  quantity: Float
  stockLevel: Float
}

# ---------------------------------------------------------------------------
# Search
# ---------------------------------------------------------------------------

type Search {
  query: String!
  locale: String
  currency: String
  total: Int!
}

type ProductSearch {
  query: String!
  total: Int!
  hits: [ProductSearchHit!]!
  refinements: [SearchRefinement!]!
  selectedRefinements: JSON
  sortOptions: [SortOption!]!
  selectedSortingOption: String
  limit: Int!
  offset: Int!
  searchPhraseSuggestions: SearchSuggestions
  category: Category
}

type ProductSearchHit {
  productId: String!
  productName: String
  product: Product
  representedProduct: Product
  variationAttributes: [VariationAttribute!]!
  image: ProductImage
  currency: String
  price: Float
  priceMax: Float
  priceMin: Float
  prices: [Price!]!
  orderable: Boolean
  hitType: String
  relevance: Float
}

type ContentSearch {
  query: String!
  total: Int!
  hits: [ContentSearchHit!]!
  refinements: [SearchRefinement!]!
  limit: Int!
  offset: Int!
}

type ContentSearchHit {
  id: String!
  name: String
  description: String
  page: Page
}

type StoreSearch {
  query: String
  latitude: Float
  longitude: Float
  maxDistance: Float
  total: Int!
  stores: [Store!]!
}

type SearchRefinement {
  attributeId: String!
  label: String!
  values: [SearchRefinementValue!]!
}

type SearchRefinementValue {
  label: String!
  value: String!
  hitCount: Int
  presentationId: String
  values: [SearchRefinementValue!]!
}

type SortOption {
  id: String!
  label: String!
}

type SearchSuggestions {
  suggestedPhrases: [SuggestedPhrase!]!
  suggestedTerms: [SuggestedTerms!]!
  productSuggestions: ProductSuggestions
  categorySuggestions: CategorySuggestions
}

type SuggestedPhrase {
  exactMatch: Boolean
  phrase: String!
}

type SuggestedTerms {
  originalTerm: String!
  terms: [SuggestedTerm!]!
}

type SuggestedTerm {
  completed: Boolean
  corrected: Boolean
  exactMatch: Boolean
  value: String!
}

type ProductSuggestions {
  products: [Product!]!
}

type CategorySuggestions {
  categories: [Category!]!
}

# ---------------------------------------------------------------------------
# Store
# ---------------------------------------------------------------------------

type Store {
  id: ID!
  name: String!
  address1: String
  address2: String
  city: String
  stateCode: String
  postalCode: String
  countryCode: String
  phone: String
  email: String
  fax: String
  latitude: Float
  longitude: Float
  distance: Float
  distanceUnit: String
  storeHours: String
  storeEvents: String
  storeLocatorEnabled: Boolean
  inventoryId: String
  image: String
  posEnabled: Boolean
  storePickupEnabled: Boolean
  customAttributes: JSON
}

# ---------------------------------------------------------------------------
# Site and Configuration
# ---------------------------------------------------------------------------

type Site {
  id: ID!
  name: String!
  description: String
  timezone: String
  locales: [Locale!]!
  defaultLocale: Locale
  currencies: [Currency!]!
  defaultCurrency: Currency
  catalogs: [Catalog!]!
  defaultCatalog: Catalog
  customerLists: [CustomerList!]!
  inventoryLists: [InventoryList!]!
  priceBooks: [PriceBook!]!
  status: SiteStatus
}

enum SiteStatus {
  ONLINE
  OFFLINE
  MAINTENANCE
}

type SiteConfig {
  siteId: ID!
  preferences: JSON
  searchPreferences: SearchPreferences
  checkoutPreferences: CheckoutPreferences
  cartPreferences: CartPreferences
}

type SearchPreferences {
  enableSearchSuggestions: Boolean
  maxSuggestions: Int
  searchableAttributes: [String!]
}

type CheckoutPreferences {
  requireEmailConfirmation: Boolean
  allowGuestCheckout: Boolean
  defaultPaymentMethodId: String
}

type CartPreferences {
  maxItems: Int
  mergeOnLogin: Boolean
  persistentCartEnabled: Boolean
}


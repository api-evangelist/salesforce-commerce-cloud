# ---------------------------------------------------------------------------
# Root Types
# ---------------------------------------------------------------------------

type Query {
  # Catalog and Products
  catalog(id: ID!): Catalog
  catalogs(siteId: String): [Catalog!]!
  category(id: ID!, levels: Int, locale: String): Category
  product(id: ID!, locale: String, currency: String): Product
  products(ids: [ID!]!, locale: String, currency: String): [Product!]!
  productSearch(query: String!, refinements: JSON, sortBy: String, limit: Int, offset: Int, locale: String, currency: String): ProductSearch!

  # Pricing
  priceBook(id: ID!): PriceBook
  priceBooks(siteId: String): [PriceBook!]!

  # Promotions
  campaign(id: ID!): Campaign
  campaigns(siteId: String): [Campaign!]!
  promotion(id: ID!): Promotion
  promotions(campaignId: String, locale: String): [Promotion!]!
  coupon(id: ID!): Coupon

  # Cart
  cart(basketId: ID!): Cart
  customerBaskets(customerId: ID!): [CustomerBasket!]!

  # Orders
  order(id: ID!): Order
  orders(customerId: String, status: OrderStatus, limit: Int, offset: Int): CustomerOrderConnection!

  # Customers
  customer(id: ID!): Customer
  customers(email: String, customerNo: String, limit: Int, offset: Int): [Customer!]!
  customerGroup(id: ID!): CustomerGroup
  customerGroups(siteId: String): [CustomerGroup!]!
  customerList(id: ID!): CustomerList

  # Inventory
  inventoryList(id: ID!): InventoryList
  inventoryRecord(inventoryListId: ID!, productId: ID!): InventoryRecord

  # Search
  contentSearch(query: String!, limit: Int, offset: Int, locale: String): ContentSearch!
  storeSearch(query: String, latitude: Float, longitude: Float, maxDistance: Float, limit: Int, offset: Int): StoreSearch!

  # Store
  store(id: ID!): Store
  stores(siteId: String, inventoryListId: String): [Store!]!

  # Site
  site(id: ID!): Site
  sites: [Site!]!
  siteConfig(siteId: ID!): SiteConfig

  # Content
  contentAsset(id: ID!, locale: String): ContentAsset
  contentSlot(id: ID!, context: String, locale: String): ContentSlot
  page(id: ID!, locale: String): Page

  # Einstein
  einsteinRecommendations(recommenderName: String!, context: EinsteinContextInput!): EinsteinRecommendation!

  # Gift Cards
  giftCard(code: String!): GiftCard

  # Session
  session(id: ID!): Session

  # A/B Tests
  abTest(id: ID!): ABTest
  abTests(siteId: String): [ABTest!]!

  # Custom Objects
  customObject(typeId: String!, keyId: String!): CustomObject
}

type Mutation {
  # Cart
  createCart(siteId: String, locale: String, currency: String): Cart!
  addToCart(basketId: ID!, items: [CartItemInput!]!): Cart!
  updateCartItem(basketId: ID!, itemId: ID!, quantity: Float!): Cart!
  removeCartItem(basketId: ID!, itemId: ID!): Cart!
  applyCoupon(basketId: ID!, code: String!): Cart!
  removeCoupon(basketId: ID!, couponItemId: ID!): Cart!
  setShippingAddress(basketId: ID!, address: AddressInput!, shipmentId: String): Cart!
  setShippingMethod(basketId: ID!, methodId: ID!, shipmentId: String): Cart!
  setBillingAddress(basketId: ID!, address: AddressInput!): Cart!
  addPaymentInstrument(basketId: ID!, payment: PaymentInput!): Cart!
  removePaymentInstrument(basketId: ID!, paymentInstrumentId: ID!): Cart!

  # Order
  createOrder(basketId: ID!): Order!
  cancelOrder(orderId: ID!, reason: String): Order!
  updateOrderStatus(orderId: ID!, status: OrderStatus!): Order!
  addOrderNote(orderId: ID!, text: String!, subject: String): Order!

  # Customer
  createCustomer(email: String!, password: String!, firstName: String, lastName: String): Customer!
  updateCustomer(customerId: ID!, input: CustomerInput!): Customer!
  addCustomerAddress(customerId: ID!, address: AddressInput!): CustomerAddress!
  updateCustomerAddress(customerId: ID!, addressId: ID!, address: AddressInput!): CustomerAddress!
  deleteCustomerAddress(customerId: ID!, addressId: ID!): Boolean!

  # Wishlist
  createWishList(customerId: ID!, name: String!, public: Boolean): WishList!
  addToWishList(customerId: ID!, wishListId: ID!, productId: String!, quantity: Float): WishListItem!
  removeFromWishList(customerId: ID!, wishListId: ID!, itemId: ID!): Boolean!

  # Auth
  getShopperToken(clientId: String!, siteId: String!, usid: String): ShopperToken!
  refreshShopperToken(refreshToken: String!, clientId: String!): ShopperToken!

  # Gift Cards
  redeemGiftCard(basketId: ID!, code: String!): Cart!
}

# ---------------------------------------------------------------------------
# Input Types
# ---------------------------------------------------------------------------

input CartItemInput {
  productId: String!
  quantity: Float!
  optionItems: [OptionItemInput!]
  customAttributes: JSON
}

input OptionItemInput {
  optionId: String!
  optionValueId: String!
}

input AddressInput {
  firstName: String
  lastName: String
  address1: String!
  address2: String
  city: String!
  stateCode: String
  postalCode: String
  countryCode: String!
  phone: String
  companyName: String
}

input PaymentInput {
  paymentMethodId: String!
  amount: Float
  creditCardToken: String
  maskedGiftCertificateCode: String
}

input CustomerInput {
  firstName: String
  lastName: String
  email: String
  phoneHome: String
  phoneMobile: String
  birthday: String
  gender: CustomerGender
  preferences: JSON
  customAttributes: JSON
}

input EinsteinContextInput {
  productIds: [String!]
  categoryId: String
  searchPhrase: String
  userId: String
  clientId: String!
  siteId: String!
  cookieId: String
}
